name = "drtv"
main = ".next/static/chunks/worker.js"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]

# 使用 next-on-pages 适配器
[build]
command = "npm run build"
upload = { format = "service-worker" }

# 静态资源目录
[site]
bucket = ".next/static"
entry-point = "."

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "dr"
database_id = "15101641-cffe-4cf7-ba9c-be63820e6722"

# KV 命名空间绑定（用于缓存和会话存储）
[[kv_namespaces]]
binding = "KV_STORE"
id = "yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy"

# R2 存储桶绑定（用于媒体文件存储）
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "drtv-media-storage"

# 环境变量配置
[vars]
NODE_VERSION = "20.10.0"
NEXT_PUBLIC_API_URL = "https://api.tv.example.com"
REDIS_URL = "redis://upstash-redis-url"
ENVIRONMENT = "production"
NEXT_PUBLIC_VIDSTACK_VERSION = "1.12.13"

# 开发环境配置
[env.dev]
name = "drtv-dev"
[env.dev.vars]
ENVIRONMENT = "development"
NEXT_PUBLIC_API_URL = "https://dev.api.drtv.example.com"
